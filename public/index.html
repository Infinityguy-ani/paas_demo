<!DOCTYPE html>
<html>
<head>
    <title>PaaS Demo</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            width: 300px;
        }

        input, textarea {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
            border: none;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff7eb3;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Feedback Form</h2>
        <form action="/submit" method="POST">
            <input type="text" name="name" placeholder="Your Name" required />
            <textarea name="feedback" placeholder="Your Feedback" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
